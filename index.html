<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>皇城·万象 | Imperial City · Grand Panorama</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/gesture.css">
  <link rel="stylesheet" href="css/voice-assistant.css">
  <link rel="stylesheet" href="css/language-toggle.css">
</head>
<body>

  <!-- ========== 右上角工具栏 ========== -->
  <div class="top-toolbar" role="toolbar" aria-label="工具栏">
    <button id="gesture-toggle" class="gesture-toggle" title="开启/关闭手势控制">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22">
        <path d="M15 3a2 2 0 012 2v2a2 2 0 01-2 2M9 3a2 2 0 00-2 2v2a2 2 0 002 2M12 14v7M8 18h8M7 9v3a5 5 0 0010 0V9"/>
      </svg>
    </button>
    <button id="language-toggle" class="language-toggle" title="切换语言/Change Language">
      中文/EN
    </button>
  </div>

  <!-- ========== 手势光标 ========== -->
  <div id="gesture-indicator" class="gesture-indicator">
    <div class="gesture-cursor" id="gesture-cursor"></div>
    <div class="gesture-status" id="gesture-status">
      <span class="gesture-icon">✋</span>
      <span class="gesture-label" data-i18n="gesture_on">手势控制已开启</span>
    </div>
  </div>

  <!-- ========== 首页主体 ========== -->
  <section class="landing-page">

    <!-- 背景层 -->
    <div class="landing-bg">
      <div class="bg-layer bg-layer-1"></div>
      <div class="bg-layer bg-layer-2"></div>
      <div class="bg-layer bg-layer-3"></div>
      <div class="bg-particles" id="bg-particles"></div>
      <!-- 背景图片占位 —— 替换为: <img src="assets/images/landing-bg.jpg" alt="故宫背景" class="bg-image"> -->
    </div>

    <!-- 标题区域 -->
    <div class="landing-hero">
      <div class="hero-badge" data-i18n="hero_badge">故宫古建筑智慧交互可视化平台</div>
      <h1 class="landing-title" data-i18n="site_title">皇城·万象</h1>
      <p class="landing-subtitle-en">Imperial City · Grand Panorama</p>
      <div class="landing-divider">
        <span class="divider-line"></span>
        <span class="divider-gem">◆</span>
        <span class="divider-line"></span>
      </div>
    </div>

    <!-- 三大模块入口 -->
    <nav class="module-nav">

      <!-- 模块一：建筑档案 -->
      <a href="pages/module1-archive.html" class="module-card" id="nav-module1">
        <div class="card-bg-accent"></div>
        <div class="card-icon">🏛</div>
        <div class="card-content">
          <h2 class="module-card-title" data-i18n="mod1_title">建筑档案</h2>
          <p class="module-card-subtitle">Building Archive</p>
          <p class="module-card-desc" data-i18n="mod1_desc">探索故宫20座核心建筑的身份档案</p>
        </div>
        <div class="card-arrow">→</div>
        <div class="card-hover-glow"></div>
      </a>

      <!-- 模块二：重点解读 -->
      <a href="pages/module2-taihedian.html" class="module-card" id="nav-module2">
        <div class="card-bg-accent"></div>
        <div class="card-icon">🔍</div>
        <div class="card-content">
          <h2 class="module-card-title" data-i18n="mod2_title">重点解读</h2>
          <p class="module-card-subtitle">Deep Exploration</p>
          <p class="module-card-desc" data-i18n="mod2_desc">解剖四座建筑的构件智慧与互动游戏</p>
        </div>
        <div class="card-arrow">→</div>
        <div class="card-hover-glow"></div>
      </a>

      <!-- 模块三：文化密码 -->
      <a href="pages/module3-culture.html" class="module-card" id="nav-module3">
        <div class="card-bg-accent"></div>
        <div class="card-icon">☯</div>
        <div class="card-content">
          <h2 class="module-card-title" data-i18n="mod3_title">文化密码</h2>
          <p class="module-card-subtitle">Cultural Code</p>
          <p class="module-card-desc" data-i18n="mod3_desc">中轴线、阴阳五行、风水与数字密码</p>
        </div>
        <div class="card-arrow">→</div>
        <div class="card-hover-glow"></div>
      </a>

    </nav>

    <!-- 底部信息 -->
    <div class="landing-footer">
      <p class="footer-tip" data-i18n="footer_tip">支持手势控制 · 中英双语 · AI导览</p>
    </div>

  </section>

  <!-- ========== AI助手 ========== -->
  <button id="voice-assistant-trigger" title="语音助手">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>

  <!-- Chat Panel -->
  <div id="voice-assistant-panel">
    <div class="ast-corner tl"></div>
    <div class="ast-corner tr"></div>
    <div class="ast-corner bl"></div>
    <div class="ast-corner br"></div>

    <div class="ast-header">
      <div class="ast-header-icon">🏛</div>
      <div class="ast-header-text">
        <div class="ast-header-title" id="ast-name">语音助手</div>
        <div class="ast-header-status" id="ast-status">待命中</div>
      </div>
      <button class="ast-close-btn" id="ast-close">&times;</button>
      <button class="ast-volume-btn active" id="ast-volume" title="朗读已开启" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path class="ast-vol-speaker" fill="currentColor" d="M11 5L6 9H3v6h3l5 4V5z"/>
          <path class="ast-vol-wave" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path class="ast-vol-wave" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <g class="ast-vol-mute-x" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M15.5 8l6 8"/>
            <path d="M21.5 8l-6 8"/>
          </g>
        </svg>
      </button>
    </div>

    <div class="ast-chat-area" id="ast-chat"></div>

    <div class="ast-input-area">
      <input type="text" class="ast-text-input" id="ast-input" placeholder="输入问题或点击麦克风说话..." />
      <div class="ast-waveform" id="ast-waveform">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <button class="ast-voice-btn" id="ast-mic" title="语音输入">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="ast-send-btn" id="ast-send" title="发送" type="button" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- ========== 脚本 ========== -->
  <script src="js/gesture.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/assistance.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
