<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>建筑档案 | 皇城·万象</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/archive.css">
  <link rel="stylesheet" href="../css/gesture.css">
  <link rel="stylesheet" href="../css/voice-assistant.css">
  <link rel="stylesheet" href="../css/language-toggle.css">
</head>
<body>

  <!-- ========== 顶部导航栏 ========== -->
  <nav class="page-nav">
    <a href="../index.html" class="nav-back" data-i18n="back_home">← 返回首页</a>
    <span class="nav-title">
      <span class="nav-title-zh" data-i18n="archive_title">建筑档案</span>
      <span class="nav-title-en" data-i18n="archive_title_en">Building Archive</span>
    </span>
    <div class="nav-tools">
      <button id="gesture-toggle" class="gesture-toggle" title="开启/关闭手势控制">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22">
          <path d="M15 3a2 2 0 012 2v2a2 2 0 01-2 2M9 3a2 2 0 00-2 2v2a2 2 0 002 2M12 14v7M8 18h8M7 9v3a5 5 0 0010 0V9"/>
        </svg>
      </button>
      <button id="language-toggle" class="language-toggle">中文/EN</button>
    </div>
  </nav>

  <!-- ========== 手势光标 ========== -->
  <div id="gesture-indicator" class="gesture-indicator">
    <div class="gesture-cursor" id="gesture-cursor"></div>
    <div class="gesture-status" id="gesture-status">
      <span class="gesture-icon">✋</span>
      <span class="gesture-label" data-i18n="gesture_on">手势控制已开启</span>
    </div>
  </div>

  <!-- ========== 主内容区 ========== -->
  <main class="archive-main">

    <!-- 左侧：故宫俯视总览图 -->
    <div class="archive-map-container" id="map-container">
      <!-- 总览图占位 -->
      <div class="map-placeholder" id="overview-map">
        <div class="placeholder-content">
          <div class="placeholder-icon">🏛</div>
          <p class="placeholder-main" data-i18n="placeholder_map">【占位】请在这里插入故宫俯视总览图</p>
          <p class="placeholder-path">assets/images/overview-map.png</p>
          <!-- 替换为: <img src="../assets/images/overview-map.png" alt="故宫俯视图" id="map-image"> -->
        </div>
        <!-- 建筑热点标记 —— 由 archive.js 动态生成 -->
        <div class="building-markers" id="building-markers"></div>
      </div>
    </div>

    <!-- 右侧：信息面板 -->
    <aside class="archive-panel" id="archive-panel">

      <!-- 默认状态 -->
      <div class="panel-empty" id="panel-empty">
        <div class="empty-icon">👆</div>
        <p data-i18n="click_building">点击地图上的建筑查看档案</p>
      </div>

      <!-- 档案内容（点击建筑后显示） -->
      <div class="panel-content hidden" id="panel-content">

        <!-- 标签切换按钮 -->
        <div class="panel-tabs">
          <button class="tab-btn active" data-tab="archive" data-i18n="tab_archive">档案卡</button>
          <button class="tab-btn" data-tab="events" data-i18n="tab_events">事件卡</button>
        </div>

        <!-- 档案卡 -->
        <div class="archive-card" id="archive-card">
          <div class="card-images">
            <div class="card-image-placeholder" id="card-image">
              <p data-i18n="placeholder_building_img">【占位】建筑实物图</p>
            </div>
          </div>
          <h3 class="card-name" id="card-name">建筑名称</h3>
          <p class="card-name-en" id="card-name-en">English Name</p>

          <div class="card-info-list">
            <div class="card-info-item">
              <span class="info-label" data-i18n="label_area">区域</span>
              <span class="info-value" id="card-area">【占位】</span>
            </div>
            <div class="card-info-item">
              <span class="info-label" data-i18n="label_function">功能</span>
              <span class="info-value" id="card-function">【占位】</span>
            </div>
            <div class="card-info-item">
              <span class="info-label" data-i18n="label_rank">等级</span>
              <span class="info-value" id="card-rank">【占位】</span>
            </div>
            <div class="card-info-item">
              <span class="info-label" data-i18n="label_roof">屋顶形制</span>
              <span class="info-value" id="card-roof">【占位】</span>
            </div>
            <div class="card-info-item">
              <span class="info-label" data-i18n="label_built">建造年代</span>
              <span class="info-value" id="card-built">【占位】</span>
            </div>
            <div class="card-info-item">
              <span class="info-label" data-i18n="label_material">材料来源</span>
              <span class="info-value" id="card-material">【占位】</span>
            </div>
          </div>

          <div class="card-trivia" id="card-trivia">
            <p data-i18n="placeholder_trivia">【占位】趣闻内容</p>
          </div>

          <!-- 重点建筑专属按钮 -->
          <a class="explore-wisdom-btn hidden" id="explore-btn" data-i18n="explore_wisdom">
            探索建筑智慧 →
          </a>
        </div>

        <!-- 事件卡 -->
        <div class="event-card hidden" id="event-card">
          <h4 data-i18n="tab_events">历史事件</h4>
          <div class="event-list" id="event-list">
            <p data-i18n="placeholder_event">【占位】事件内容由JS动态填充</p>
          </div>
        </div>

      </div>
    </aside>

  </main>

  <!-- ========== AI助手 ========== -->
  <button id="voice-assistant-trigger" title="语音助手">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>

  <div id="voice-assistant-panel">
    <div class="ast-corner tl"></div>
    <div class="ast-corner tr"></div>
    <div class="ast-corner bl"></div>
    <div class="ast-corner br"></div>
    <div class="ast-header">
      <div class="ast-header-icon">🏛</div>
      <div class="ast-header-text">
        <div class="ast-header-title" id="ast-name">语音助手</div>
        <div class="ast-header-status" id="ast-status">待命中</div>
      </div>
      <button class="ast-close-btn" id="ast-close">&times;</button>
      <button class="ast-volume-btn active" id="ast-volume" title="朗读已开启" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path class="ast-vol-speaker" fill="currentColor" d="M11 5L6 9H3v6h3l5 4V5z"/>
          <path class="ast-vol-wave" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path class="ast-vol-wave" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <g class="ast-vol-mute-x" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M15.5 8l6 8"/><path d="M21.5 8l-6 8"/>
          </g>
        </svg>
      </button>
    </div>
    <div class="ast-chat-area" id="ast-chat"></div>
    <div class="ast-input-area">
      <input type="text" class="ast-text-input" id="ast-input" placeholder="输入问题或点击麦克风说话..." />
      <div class="ast-waveform" id="ast-waveform"><span></span><span></span><span></span><span></span><span></span></div>
      <button class="ast-voice-btn" id="ast-mic" title="语音输入"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
      <button class="ast-send-btn" id="ast-send" title="发送" type="button" disabled><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>

  <!-- ========== 脚本 ========== -->
  <script src="../js/gesture.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/assistance.js"></script>
  <script src="../js/building-data.js"></script>
  <script src="../js/archive.js"></script>
  <script src="../js/app.js"></script>

</body>
</html>
